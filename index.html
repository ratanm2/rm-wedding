<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ratan & Apurva</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- WELCOME -->

<section id="welcome" class="screen active">

<div class="monogram">
<div>R</div>
<div class="amp">&</div>
<div>A</div>
</div>

<button id="openBtn">
Open Invitation
</button>

</section>

<!-- SCRATCH -->

<section id="scratch" class="screen">

<h2>Reveal The Date</h2>

<div class="scratch-wrapper">

<div class="scratch-card">
<div class="hidden-text">19</div>
<canvas></canvas>
</div>

<div class="scratch-card">
<div class="hidden-text">JUNE</div>
<canvas></canvas>
</div>

<div class="scratch-card">
<div class="hidden-text">2026</div>
<canvas></canvas>
</div>

</div>

</section>

<!-- CURTAIN -->

<section id="curtainScreen" class="screen">

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="couple-name">
<h1>Ratan</h1>
<span>&</span>
<h1>Apurva</h1>
</div>

</section>

<!-- INVITATION -->

<section id="invitation" class="screen">

<h2>
With the blessings of Lord Ganesha
</h2>

<p>
Together with our families,
we invite you to celebrate
our wedding ceremony.
</p>

<button>
Continue
</button>

</section>

<script src="script.js"></script>

</body>
</html>
